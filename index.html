<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBRIC ENGENHARIA - Painel Restrito</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { ebricRed: '#E30613' } } }
        }
        const SUPABASE_URL = "https://ilsgmpincsxvhhlyzydq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GMcaHz-mHuB5oItupA6hqg_Vpf80HU6";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <style>
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans overflow-x-hidden">

    <div id="telaGate" class="h-screen w-full flex items-center justify-center p-6 fade-in">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl border border-gray-100 text-center max-w-md w-full">
            <img src="logo.png" alt="EBRIC" class="h-16 mx-auto mb-8">
            <h2 class="text-gray-800 font-black uppercase text-sm mb-2 tracking-[0.2em]">Acesso Interno</h2>
            <p class="text-gray-400 text-[10px] mb-10 font-bold uppercase">Ebric Engenharia & Consultoria</p>
            
            <div class="space-y-4">
                <input type="password" id="inputSenha" placeholder="Digite a Senha Mestra" 
                    class="w-full p-5 bg-gray-50 border border-gray-200 rounded-2xl text-center font-black tracking-widest outline-none focus:ring-2 focus:ring-ebricRed transition-all">
                <button onclick="validarAcesso()" class="w-full bg-ebricRed text-white p-5 rounded-2xl font-black uppercase text-xs tracking-widest shadow-xl shadow-red-100 hover:scale-105 transition-transform active:scale-95">
                    Entrar no Painel
                </button>
            </div>
        </div>
    </div>

    <div id="telaPainel" class="hidden fade-in">
        <header class="bg-white border-b-4 border-ebricRed shadow-md p-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="logo.png" alt="EBRIC" class="h-10">
                    <h1 class="text-lg font-black text-gray-800 uppercase tracking-tighter">Central de Logins</h1>
                </div>
                <button onclick="location.reload()" class="text-[10px] font-black text-gray-400 hover:text-ebricRed uppercase tracking-widest transition-colors">Sair / Bloquear</button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-6 md:p-10">
            <div class="flex gap-2 overflow-x-auto pb-6 no-scrollbar">
                <span class="bg-ebricRed text-white px-6 py-2 rounded-full text-[10px] font-black uppercase whitespace-nowrap">Todos os Acessos</span>
            </div>

            <div id="containerDados" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </main>
    </div>

    <script>
        const gate = document.getElementById('telaGate');
        const painel = document.getElementById('telaPainel');
        const container = document.getElementById('containerDados');

        // Função de Validação
        function validarAcesso() {
            const senhaDigitada = document.getElementById('inputSenha').value;
            if (senhaDigitada === "8400") {
                gate.classList.add('hidden');
                painel.classList.remove('hidden');
                carregarAcessos();
            } else {
                alert("Senha Inválida! Tente novamente.");
                document.getElementById('inputSenha').value = "";
            }
        }

        // Permitir dar "Enter" na senha
        document.getElementById('inputSenha').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') validarAcesso();
        });

        async function carregarAcessos() {
            container.innerHTML = `<div class="col-span-full py-20 text-center text-gray-300 font-bold uppercase text-xs animate-pulse tracking-widest">Sincronizando Banco de Dados...</div>`;
            
            const { data, error } = await supabaseClient
                .from('acessos')
                .select('*')
                .order('criado_em', { ascending: false });

            if (data && data.length > 0) {
                container.innerHTML = data.map(item => `
                    <div class="bg-white p-7 rounded-[2.5rem] shadow-sm border border-gray-100 flex flex-col justify-between gap-6 hover:shadow-xl hover:-translate-y-1 transition-all group">
                        <div>
                            <div class="flex justify-between items-start mb-4">
                                <span class="text-[9px] font-black bg-red-50 text-ebricRed px-3 py-1 rounded-full uppercase tracking-widest">${item.link_site || 'GERAL'}</span>
                                <span class="text-gray-200 group-hover:text-ebricRed transition-colors italic">#</span>
                            </div>
                            <h3 class="font-black text-gray-900 uppercase text-base mb-1 tracking-tight">${item.nome_site}</h3>
                            <p class="text-gray-400 text-xs font-medium lowercase tracking-wide break-all">${item.email_login}</p>
                        </div>
                        
                        <div class="bg-gray-50 px-6 py-4 rounded-2xl border border-gray-100 flex justify-between items-center group-hover:bg-red-50 transition-colors">
                            <div class="flex flex-col">
                                <span class="text-[8px] font-black text-gray-300 uppercase tracking-widest mb-1">Senha de Acesso</span>
                                <span class="font-mono text-ebricRed font-black text-xl select-all">${item.senha_acesso}</span>
                            </div>
                            <button onclick="navigator.clipboard.writeText('${item.senha_acesso}')" class="text-gray-300 hover:text-ebricRed text-lg">📋</button>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 italic">Nenhum registro encontrado.</div>`;
            }
        }
    </script>
</body>
</html>
