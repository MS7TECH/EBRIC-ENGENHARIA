<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBRIC ENGENHARIA - Central de Acessos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { ebricRed: '#E30613' } } }
        }
        const SUPABASE_URL = "https://ilsgmpincsxvhhlyzydq.supabase.co";
        const SUPABASE_KEY = "sb_publishable_GMcaHz-mHuB5oItupA6hqg_Vpf80HU6";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    </script>
    <style>
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div id="paginaInicial" class="fade-in">
        <header class="bg-white border-b-4 border-ebricRed shadow-md p-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
                <div class="flex items-center gap-3">
                    <img src="logo.png" alt="EBRIC" class="h-10 sm:h-12">
                    <div class="border-l-2 border-ebricRed pl-3">
                        <h1 class="text-lg sm:text-xl font-black text-gray-800 uppercase tracking-tighter">Gerenciador EBRIC</h1>
                    </div>
                </div>
                <span class="text-[10px] font-bold text-ebricRed bg-red-50 px-4 py-1.5 rounded-full uppercase border border-red-100">Proteção MS7TECH</span>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-4 sm:p-8 grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-1">
                <div class="bg-white p-6 rounded-[2.5rem] shadow-xl border border-gray-100 sticky top-28">
                    <h2 class="text-gray-700 font-bold mb-6 flex items-center gap-2 uppercase text-sm tracking-widest">
                        <span class="bg-ebricRed text-white w-6 h-6 flex items-center justify-center rounded-full text-xs">+</span> Novo Registro
                    </h2>
                    <form id="formSenha" class="space-y-4">
                        <select id="tipo_site" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none focus:ring-2 focus:ring-ebricRed appearance-none cursor-pointer">
                            <option value="SITE">🌐 Site / Web</option>
                            <option value="SISTEMA">🖥️ Sistema Interno</option>
                            <option value="LINK">🔗 Link Direto</option>
                            <option value="EMAIL">📧 E-mail Corporativo</option>
                        </select>
                        <input type="text" id="nome_site" placeholder="Nome do Serviço" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none" required>
                        <input type="email" id="email" placeholder="Login" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none" required>
                        <input type="text" id="senha" placeholder="Senha" class="w-full p-4 bg-gray-50 border border-gray-200 rounded-2xl outline-none" required>
                        <button type="submit" id="btnSalvar" class="w-full bg-ebricRed text-white font-black py-4 rounded-2xl hover:bg-red-700 transition-all uppercase text-xs">SALVAR ACESSO</button>
                    </form>
                </div>
            </div>

            <div class="lg:col-span-2 space-y-8">
                <div class="bg-white p-12 rounded-[2.5rem] border-2 border-dashed border-gray-200 text-center">
                    <div class="mb-6 text-4xl">🔐</div>
                    <h2 class="text-gray-800 font-black uppercase text-sm mb-4 tracking-widest">Acesso ao Painel</h2>
                    <p class="text-gray-400 text-xs mb-8 font-medium">Você será redirecionado para a central de logins após a senha.</p>
                    <button onclick="acessarPainel()" class="bg-gray-900 text-white px-10 py-5 rounded-2xl font-black text-xs hover:bg-ebricRed transition-all shadow-xl uppercase tracking-widest active:scale-95">
                        Liberar Central de Senhas
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="paginaPainel" class="hidden fade-in min-h-screen bg-gray-100">
        <header class="bg-white border-b-4 border-ebricRed shadow-sm p-4 sticky top-0 z-50">
            <div class="max-w-6xl mx-auto flex justify-between items-center">
                <div class="flex items-center gap-3">
                    <img src="logo.png" alt="EBRIC" class="h-10">
                    <h1 class="text-lg font-black text-gray-800 uppercase tracking-tighter">Central de Logins</h1>
                </div>
                <button onclick="location.reload()" class="bg-gray-50 text-gray-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase border hover:text-ebricRed transition-all">Sair / Bloquear</button>
            </div>
        </header>

        <main class="max-w-6xl mx-auto p-6 sm:p-10">
            <div id="containerDados" class="space-y-12">
                </div>
        </main>
    </div>

    <script>
        const pgInicial = document.getElementById('paginaInicial');
        const pgPainel = document.getElementById('paginaPainel');
        const container = document.getElementById('containerDados');

        // A MÁGICA DO REDIRECIONAMENTO INTERNO
        function acessarPainel() {
            const senha = prompt("Digite a senha de acesso:");
            if (senha === "8400") {
                // Esconde a página de cadastro e mostra o painel limpo
                pgInicial.classList.add('hidden');
                pgPainel.classList.remove('hidden');
                carregarAcessos();
            } else if (senha !== null) {
                alert("Senha incorreta!");
            }
        }

        async function carregarAcessos() {
            container.innerHTML = `<div class="py-20 text-center text-gray-400 font-bold animate-pulse text-xs tracking-widest uppercase">Acessando Banco de Dados EBRIC...</div>`;
            
            const { data, error } = await supabaseClient.from('acessos').select('*').order('criado_em', { ascending: false });

            if (data && data.length > 0) {
                const grupos = data.reduce((acc, obj) => {
                    const key = obj.link_site || 'OUTROS';
                    if (!acc[key]) acc[key] = [];
                    acc[key].push(obj);
                    return acc;
                }, {});

                container.innerHTML = Object.keys(grupos).map(categoria => `
                    <div class="space-y-6">
                        <div class="flex items-center gap-4">
                            <span class="h-[2px] w-10 bg-ebricRed"></span>
                            <h2 class="text-[11px] font-black text-gray-400 uppercase tracking-[0.3em]">${categoria}</h2>
                        </div>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${grupos[categoria].map(item => `
                                <div class="bg-white p-6 rounded-[2.5rem] shadow-sm border border-gray-100 hover:shadow-xl hover:-translate-y-1 transition-all group">
                                    <div class="mb-6">
                                        <h3 class="font-black text-gray-900 uppercase text-sm mb-1">${item.nome_site}</h3>
                                        <p class="text-gray-400 text-[11px] font-medium lowercase truncate">${item.email_login}</p>
                                    </div>
                                    <div class="bg-gray-50 px-5 py-4 rounded-2xl border border-gray-100 flex justify-between items-center group-hover:bg-red-50">
                                        <div class="flex flex-col">
                                            <span class="text-[8px] font-black text-gray-300 uppercase tracking-widest">Senha</span>
                                            <span class="font-mono text-ebricRed font-black text-xl select-all tracking-wider">${item.senha_acesso}</span>
                                        </div>
                                        <button onclick="navigator.clipboard.writeText('${item.senha_acesso}')" class="text-gray-300 hover:text-ebricRed transition-colors">📋</button>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = `<p class="text-center py-20 text-gray-400 italic">Nenhum registro encontrado.</p>`;
            }
        }

        document.getElementById('formSenha').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSalvar');
            btn.innerText = "SALVANDO..."; btn.disabled = true;

            const { error } = await supabaseClient.from('acessos').insert([{
                nome_site: document.getElementById('nome_site').value,
                email_login: document.getElementById('email').value,
                senha_acesso: document.getElementById('senha').value,
                link_site: document.getElementById('tipo_site').value
            }]);

            if (!error) {
                document.getElementById('formSenha').reset();
                alert("Salvo com sucesso!");
            }
            btn.innerText = "SALVAR ACESSO"; btn.disabled = false;
        });
    </script>
</body>
</html>
